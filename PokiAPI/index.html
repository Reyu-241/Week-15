<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon SA Regions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Pokémon of South Africa</h1>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="filterPokemon()">
    <select id="regionFilter" onchange="filterPokemon()">
      <option value="">All Provinces</option>
      <option value="Western Cape">Western Cape</option>
      <option value="Eastern Cape">Eastern Cape</option>
      <option value="Northern Cape">Northern Cape</option>
      <option value="Free State">Free State</option>
      <option value="KwaZulu-Natal">KwaZulu-Natal</option>
      <option value="North West">North West</option>
      <option value="Gauteng">Gauteng</option>
      <option value="Mpumalanga">Mpumalanga</option>
      <option value="Limpopo">Limpopo</option>
    </select>
    <button onclick="clearTeam()">Clear Team</button>
  </div>
  <div class="controls">
        <select class="type-filter" id="typeFilter" onchange="filterPokemon()">
            <option value="">All Types</option>
            <option value="normal">Normal</option>
            <option value="fire">Fire</option>
            <option value="water">Water</option>
            <option value="electric">Electric</option>
            <option value="grass">Grass</option>
            <option value="ice">Ice</option>
            <option value="fighting">Fighting</option>
            <option value="poison">Poison</option>
            <option value="ground">Ground</option>
            <option value="flying">Flying</option>
            <option value="psychic">Psychic</option>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa````````````````````````````````````````````````````````````````````````````````````
            <option value="bug">Bug</option>
            <option value="rock">Rock</option>
            <option value="ghost">Ghost</option>
            <option value="dragon">Dragon</option>
            <option value="dark">Dark</option>
            <option value="steel">Steel</option>
            <option value="fairy">Fairy</option>
        </select>
    </div>

  <div id="pokemonGrid" class="grid"></div>

  <div class="team">
    <h2>Your Team (6)</h2>
    <div id="teamGrid" class="team-grid"></div>
    <canvas id="teamChart" width="800" height="300"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
